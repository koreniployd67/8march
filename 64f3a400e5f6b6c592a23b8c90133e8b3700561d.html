<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Orbit</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

.wrapper{
    position:relative;
    width:500px;
    height:500px;
}

.center{
    position:absolute;
    width:140px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* вращение всей орбиты */
.orbit{
    position:absolute;
    width:100%;
    height:100%;
    animation:spin 12s linear infinite;
}

/* позиция точки на орбите */
.item{
    position:absolute;
    top:50%;
    left:50%;
}

/* сами картинки */
.item img{
    width:80px;
    height:80px;
    animation:counter 12s linear infinite;
}

/* размещение + компенсация угла */
.i1{ transform:rotate(0deg) translate(200px) rotate(0deg); }
.i2{ transform:rotate(60deg) translate(200px) rotate(-60deg); }
.i3{ transform:rotate(120deg) translate(200px) rotate(-120deg); }
.i4{ transform:rotate(180deg) translate(200px) rotate(-180deg); }
.i5{ transform:rotate(240deg) translate(200px) rotate(-240deg); }
.i6{ transform:rotate(300deg) translate(200px) rotate(-300deg); }

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* компенсация вращения орбиты */
@keyframes counter{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(-360deg); }
}

</style>
</head>

<body>

<div class="wrapper">

<img src="center.gif" class="center">

<div class="orbit">

<div class="item i1"><img src="img1.png"></div>
<div class="item i2"><img src="img2.png"></div>
<div class="item i3"><img src="img3.png"></div>
<div class="item i4"><img src="img4.png"></div>
<div class="item i5"><img src="img5.png"></div>
<div class="item i6"><img src="img6.png"></div>

</div>

</div>

</body>
</html>
