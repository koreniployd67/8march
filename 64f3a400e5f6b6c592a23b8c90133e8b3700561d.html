<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotating Images</title>

<style>

body{
    margin:0;
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.scene{
    position:relative;
    width:600px;
    height:600px;
}

.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:300px;
    height:auto;
}

.orbit{
    position:absolute;
    width:100%;
    height:100%;
    animation:rotate 20s linear infinite;
}

.img{
    position:absolute;
    width:120px;
    height:auto;
    object-fit:contain;
    animation:counterRotate 20s linear infinite;
}

/* позиции по кругу */

.img1{ top:0%; left:50%; transform:translate(-50%,-50%); }
.img2{ top:25%; left:93%; transform:translate(-50%,-50%); }
.img3{ top:75%; left:93%; transform:translate(-50%,-50%); }
.img4{ top:100%; left:50%; transform:translate(-50%,-50%); }
.img5{ top:75%; left:7%; transform:translate(-50%,-50%); }
.img6{ top:25%; left:7%; transform:translate(-50%,-50%); }

/* вращение */

@keyframes rotate{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes counterRotate{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(-360deg); }
}

</style>
</head>

<body>

<div class="scene">

<div class="orbit">
<img src="img1.png" class="img img1">
<img src="img2.png" class="img img2">
<img src="img3.png" class="img img3">
<img src="img4.png" class="img img4">
<img src="img5.png" class="img img5">
<img src="img6.png" class="img img6">
</div>

<img src="center.gif" class="center">

</div>

</body>
</html>
