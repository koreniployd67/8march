<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Orbit around GIF</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

.wrapper {
    position: relative;
    width: 500px;
    height: 500px;
}

/* Центральный GIF */
.center {
    position: absolute;
    width: 140px;
    height: 140px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Вращающаяся орбита */
.orbit {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

/* Каждый объект на орбите */
.item {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    transform-origin: 0 0;
    animation: rotateOrbit 12s linear infinite;
}

/* Картинка внутри смещена по радиусу */
.item img {
    position: absolute;
    top: -40px; /* половина картинки */
    left: 200px; /* радиус орбиты */
    width: 80px;
    height: 80px;
    /* не вращается */
}

.i1 { animation-delay: 0s; }
.i2 { animation-delay: -2s; }
.i3 { animation-delay: -4s; }
.i4 { animation-delay: -6s; }
.i5 { animation-delay: -8s; }
.i6 { animation-delay: -10s; }

/* Анимация вращения центра картинки вокруг GIF */
@keyframes rotateOrbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="wrapper">
    <img src="center.gif" class="center">

    <div class="orbit">
        <div class="item i1"><img src="img1.png"></div>
        <div class="item i2"><img src="img2.png"></div>
        <div class="item i3"><img src="img3.png"></div>
        <div class="item i4"><img src="img4.png"></div>
        <div class="item i5"><img src="img5.png"></div>
        <div class="item i6"><img src="img6.png"></div>
    </div>
</div>

</body>
</html>
