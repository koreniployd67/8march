<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Orbit</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

/* орбита */
.orbit{
    position:relative;
    width:400px;
    height:400px;
}

/* центральный gif */
.center{
    position:absolute;
    top:50%;
    left:50%;
    width:120px;
    transform:translate(-50%,-50%);
}

/* контейнер каждой картинки */
.item{
    position:absolute;
    top:50%;
    left:50%;
    width:80px;
    height:80px;

    animation: orbit 10s linear infinite;
}

/* сама картинка */
.item img{
    width:100%;
    animation: keepStraight 10s linear infinite;
}

/* расстояние от центра */
.item img{
    transform:translateX(160px);
}

/* задержки чтобы распределить 6 картинок */
.i1{ animation-delay:0s }
.i2{ animation-delay:-1.66s }
.i3{ animation-delay:-3.33s }
.i4{ animation-delay:-5s }
.i5{ animation-delay:-6.66s }
.i6{ animation-delay:-8.33s }

@keyframes orbit{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

@keyframes keepStraight{
    from{ transform:translateX(160px) rotate(0deg); }
    to{ transform:translateX(160px) rotate(-360deg); }
}

</style>
</head>

<body>

<div class="orbit">

<img src="center.gif" class="center">

<div class="item i1"><img src="img1.png"></div>
<div class="item i2"><img src="img2.png"></div>
<div class="item i3"><img src="img3.png"></div>
<div class="item i4"><img src="img4.png"></div>
<div class="item i5"><img src="img5.png"></div>
<div class="item i6"><img src="img6.png"></div>

</div>

</body>
</html>
